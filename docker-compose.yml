services:
  captain-claw:
    build: .
    ports:
      - "23080:23080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
      - ./docker-data/home-config:/root/.captain-claw
      - ./workspace:/data/workspace
      - ./docker-data/sessions:/data/sessions
      - ./docker-data/skills:/data/skills
    restart: unless-stopped

  botport:
    build:
      context: .
      dockerfile: botport/Dockerfile
    ports:
      - "33080:33080"
    volumes:
      - ./botport/config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
    restart: unless-stopped
