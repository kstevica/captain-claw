# BotPort Configuration
# Copy to ~/.botport/config.yaml or ./config.yaml

server:
  host: "0.0.0.0"
  port: 9800
  dashboard_enabled: true

routing:
  # Routing uses a strategy chain: tag matching -> LLM (if enabled) -> least-loaded fallback.
  # The "strategy" field is kept for logging but routing always tries all strategies in order.
  strategy: "auto"
  fallback: "reject"           # "reject" (fail if no match) or "queue_until_available"

concerns:
  idle_timeout_seconds: 300    # 5 minutes - timeout concerns with no activity
  max_follow_ups: 10           # max follow-up exchanges per concern
  max_concurrent_per_instance: 5

auth:
  enabled: false
  keys:
    # Each key entry allows a CC instance to connect.
    # The "instance" field is an optional human-readable name.
    #
    # - key: "my-instance-key"
    #   secret: "my-instance-secret"
    #   instance: "claw-alpha"
    # - key: "another-key"
    #   secret: "another-secret"
    #   instance: "claw-beta"

logging:
  level: "INFO"                # DEBUG, INFO, WARNING, ERROR
  concern_history: true        # log concern exchanges to store
  retention_days: 30           # auto-cleanup concerns older than this

# LLM-powered routing (uses litellm — supports all major providers).
# When enabled, the LLM picks the best agent + persona for each concern.
# Falls back to tag matching / least-loaded if LLM is disabled or fails.
llm:
  enabled: false
  # Model uses litellm's "provider/model" format. Examples:
  #   ollama/llama3.2              (local Ollama)
  #   gemini/gemini-2.0-flash      (Google Gemini)
  #   openai/gpt-4o-mini           (OpenAI)
  #   anthropic/claude-3-haiku-20240307  (Anthropic)
  #   groq/llama-3.1-8b-instant    (Groq)
  # See https://docs.litellm.ai/docs/providers for full list.
  model: "ollama/llama3.2"
  base_url: ""                 # optional — override provider's default URL
  api_key: ""                  # required for cloud providers (set via env var or here)
  temperature: 0.1
  timeout: 30                  # seconds
